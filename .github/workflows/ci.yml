name: CI

on:
  push:
    branches: [master, main]
    paths-ignore:
      - 'docs/**'
      - '**.md'
  pull_request:
    branches: [master, main]
    paths-ignore:
      - 'docs/**'
      - '**.md'

jobs:
  ci:
    runs-on: ubuntu-22.04

    strategy:
      matrix:
        node-version: [22.22.3]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Check encoding
        run: pnpm run check-encoding

      - name: Check outdated dependencies (informational)
        run: pnpm outdated
        continue-on-error: true

      - name: Build
        run: pnpm build
